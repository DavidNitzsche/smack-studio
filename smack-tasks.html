<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smack — Master Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink: #e07868; --navy: #1e3a5f;
    --canvas: #fafaf9; --surface: #ffffff; --text: #111827;
    --muted: #6b7280; --border: #e5e7eb; --subtle: #f3f4f6;
    --green: #059669; --amber: #d97706; --red: #dc2626;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--canvas); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

  /* ─── LAYOUT ─── */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
  .main { flex: 1; min-width: 0; padding: 40px 48px 100px; }

  /* ─── SIDEBAR ─── */
  .sidebar-header { padding: 20px 18px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-back { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--muted); text-decoration: none; margin-bottom: 14px; }
  .sidebar-back:hover { color: var(--text); }
  .sidebar-title { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
  .sidebar-progress-bar { height: 5px; background: var(--subtle); border-radius: 99px; overflow: hidden; margin-bottom: 4px; }
  .sidebar-progress-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.4s ease; }
  .sidebar-progress-label { font-size: 11px; color: var(--muted); font-weight: 600; }
  .sidebar-nav { padding: 10px 10px; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; cursor: pointer; text-decoration: none; margin-bottom: 1px; transition: background 0.1s; }
  .nav-item:hover { background: var(--subtle); }
  .nav-item-icon { font-size: 15px; flex-shrink: 0; width: 18px; text-align: center; }
  .nav-item-text { flex: 1; min-width: 0; }
  .nav-item-label { font-size: 12px; font-weight: 700; color: var(--text); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav-mini-bar { height: 2px; background: var(--subtle); border-radius: 99px; overflow: hidden; margin-top: 3px; }
  .nav-mini-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.4s ease; }
  .sidebar-filter { padding: 10px 18px; border-top: 1px solid var(--border); }
  .filter-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .filter-btns { display: flex; gap: 4px; }
  .filter-btn { flex: 1; padding: 5px 0; border: 1px solid var(--border); background: var(--surface); border-radius: 6px; font-size: 11px; font-weight: 700; color: var(--muted); cursor: pointer; transition: all 0.1s; font-family: inherit; }
  .filter-btn:hover { border-color: var(--pink); color: var(--pink); }
  .filter-btn.active { background: var(--pink); border-color: var(--pink); color: #fff; }

  /* ─── PAGE HEADER ─── */
  .page-header { margin-bottom: 36px; }
  .page-eyebrow { font-size: 10px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: var(--pink); margin-bottom: 6px; }
  .page-title { font-size: 28px; font-weight: 900; letter-spacing: -0.03em; color: var(--text); margin-bottom: 6px; }
  .page-subtitle { font-size: 13px; color: var(--muted); }

  /* ─── OVERALL PROGRESS ─── */
  .overall-progress { background: linear-gradient(135deg, #0f1d30, #1e3a5f); border-radius: 16px; padding: 24px 28px; margin-bottom: 40px; }
  .op-label { font-size: 10px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: var(--pink); margin-bottom: 10px; }
  .op-row { display: flex; align-items: center; gap: 14px; }
  .op-bar { flex: 1; height: 7px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
  .op-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.4s ease; }
  .op-count { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.65); white-space: nowrap; }
  .op-count span { color: #fff; }

  /* ─── SECTION ─── */
  .section { margin-bottom: 48px; scroll-margin-top: 24px; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .section-icon { font-size: 20px; }
  .section-meta { flex: 1; }
  .section-eyebrow { font-size: 10px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: var(--pink); margin-bottom: 1px; }
  .section-title { font-size: 18px; font-weight: 900; letter-spacing: -0.02em; color: var(--text); }
  .section-badge { font-size: 11px; font-weight: 700; color: var(--muted); background: var(--subtle); padding: 3px 10px; border-radius: 99px; }
  .section-badge.done { background: rgba(5,150,105,0.1); color: var(--green); }

  /* ─── TASK ROW ─── */
  .task { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 6px; overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s; }
  .task:hover { border-color: rgba(224,120,104,0.35); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .task.completed { opacity: 0.5; }
  .task.completed .task-title { text-decoration: line-through; color: var(--muted); }
  .task.hidden { display: none; }
  .task-row { display: flex; align-items: center; gap: 12px; padding: 14px 18px; }
  .task-check { flex-shrink: 0; width: 19px; height: 19px; border-radius: 5px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; transition: all 0.15s; cursor: pointer; }
  .task-check:hover { border-color: var(--green); }
  .task.completed .task-check { background: var(--green); border-color: var(--green); }
  .task-check-icon { display: none; color: #fff; font-size: 10px; font-weight: 900; }
  .task.completed .task-check-icon { display: block; }
  .task-body { flex: 1; min-width: 0; cursor: pointer; }
  .task-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .task-desc { font-size: 12px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .task-priority { font-size: 10px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; }
  .priority-now { background: rgba(220,38,38,0.1); color: var(--red); }
  .priority-soon { background: rgba(217,119,6,0.1); color: var(--amber); }
  .priority-later { background: var(--subtle); color: var(--muted); }
  .priority-done { background: rgba(5,150,105,0.1); color: var(--green); }
  .task-open-btn { background: none; border: none; font-size: 16px; color: var(--border); cursor: pointer; padding: 2px 4px; transition: color 0.1s; line-height: 1; }
  .task-open-btn:hover { color: var(--pink); }
  .task-step-progress { font-size: 10px; font-weight: 700; color: var(--muted); white-space: nowrap; }
  .task-step-progress.all-done { color: var(--green); }

  /* ─── OVERLAY ─── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
  .overlay.visible { opacity: 1; pointer-events: all; }

  /* ─── SLIDE-OUT PANEL ─── */
  .panel { position: fixed; top: 0; right: 0; width: 520px; max-width: 95vw; height: 100vh; background: var(--surface); box-shadow: -8px 0 40px rgba(0,0,0,0.12); z-index: 101; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; overflow: hidden; }
  .panel.open { transform: translateX(0); }

  .panel-header { padding: 24px 24px 0; flex-shrink: 0; }
  .panel-close { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 16px; }
  .panel-close-btn { background: var(--subtle); border: none; border-radius: 8px; width: 30px; height: 30px; cursor: pointer; font-size: 16px; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
  .panel-close-btn:hover { background: var(--border); }
  .panel-priority { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .panel-title { font-size: 20px; font-weight: 900; letter-spacing: -0.02em; color: var(--text); margin-bottom: 10px; line-height: 1.2; }
  .panel-desc { font-size: 13px; color: var(--muted); line-height: 1.6; padding-bottom: 16px; border-bottom: 1px solid var(--border); }

  .panel-body { flex: 1; overflow-y: auto; padding: 20px 24px 40px; }

  /* Panel sections */
  .panel-section { margin-bottom: 28px; }
  .panel-section-title { font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

  /* Why */
  .panel-why { font-size: 13px; color: var(--text); line-height: 1.65; background: rgba(30,58,95,0.04); border-left: 3px solid var(--navy); border-radius: 0 8px 8px 0; padding: 12px 14px; }

  /* Note/warning */
  .panel-note { font-size: 12px; line-height: 1.6; border-radius: 8px; padding: 10px 14px; margin-top: 10px; }
  .panel-note.warn { background: rgba(217,119,6,0.08); color: #78350f; border: 1px solid rgba(217,119,6,0.2); }
  .panel-note.info { background: rgba(30,58,95,0.06); color: var(--navy); border: 1px solid rgba(30,58,95,0.15); }
  .panel-note.good { background: rgba(5,150,105,0.06); color: #065f46; border: 1px solid rgba(5,150,105,0.2); }

  /* Steps */
  .step-list { display: flex; flex-direction: column; gap: 6px; }
  .step-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: border-color 0.1s; }
  .step-item:hover { border-color: rgba(224,120,104,0.3); }
  .step-item.step-done { opacity: 0.55; }
  .step-item.step-done .step-text { text-decoration: line-through; color: var(--muted); }
  .step-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: var(--subtle); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: var(--muted); transition: all 0.15s; margin-top: 0; }
  .step-item.step-done .step-num { background: var(--green); border-color: var(--green); color: #fff; }
  .step-text { font-size: 13px; color: var(--text); line-height: 1.5; flex: 1; }

  /* Fields */
  .fields-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .fields-grid.cols-1 { grid-template-columns: 1fr; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-label { font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .field-input-wrap { position: relative; }
  .field-input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; background: var(--canvas); color: var(--text); outline: none; transition: border-color 0.15s; }
  .field-input:focus { border-color: var(--pink); background: var(--surface); }
  .field-input.sensitive { padding-right: 38px; font-family: monospace; }
  .field-toggle { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 13px; color: var(--muted); padding: 2px; }
  .field-copy-btn { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 11px; font-weight: 700; color: var(--muted); font-family: inherit; padding: 2px 4px; }
  .field-copy-btn:hover { color: var(--pink); }
  textarea.field-input { resize: vertical; min-height: 72px; padding-right: 12px; }
  .fields-note { font-size: 11px; color: var(--muted); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

  /* Panel complete btn */
  .panel-complete-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 12px 16px; border-radius: 10px; border: 2px solid var(--border); background: var(--surface); font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s; margin-top: 8px; }
  .panel-complete-btn:hover { border-color: var(--green); color: var(--green); }
  .panel-complete-btn.is-done { border-color: var(--green); background: rgba(5,150,105,0.06); color: var(--green); }
  .panel-complete-btn .btn-icon { font-size: 16px; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 28px 20px 80px; }
    .panel { width: 100vw; }
    .fields-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <a class="sidebar-back" href="smack-hub.html">← Hub</a>
      <div class="sidebar-title">Master Checklist</div>
      <div class="sidebar-progress-bar"><div class="sidebar-progress-fill" id="sidebar-fill"></div></div>
      <div class="sidebar-progress-label" id="sidebar-label">Loading…</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-filter">
      <div class="filter-label">Show</div>
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
        <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
        <button class="filter-btn" data-filter="done" onclick="setFilter('done')">Done</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">
      <div class="page-eyebrow">Smack Studio</div>
      <div class="page-title">Master Checklist</div>
      <div class="page-subtitle">Click a task to see steps, details, and store credentials. Check the box to mark done.</div>
    </div>
    <div class="overall-progress">
      <div class="op-label">Overall Progress</div>
      <div class="op-row">
        <div class="op-bar"><div class="op-fill" id="overall-fill"></div></div>
        <div class="op-count" id="overall-count"><span>0</span> / 0 complete</div>
      </div>
    </div>
    <div id="sections-container"></div>
  </main>
</div>

<!-- OVERLAY + PANEL -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-close"><button class="panel-close-btn" onclick="closePanel()">✕</button></div>
    <div class="panel-priority" id="panel-priority"></div>
    <div class="panel-title" id="panel-title"></div>
    <div class="panel-desc" id="panel-desc"></div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const SECTIONS = [
  {
    id: 'business', icon: '🏢', label: 'Business Setup', title: 'Accounts & Infrastructure',
    tasks: [
      {
        id: 'domain', title: 'smack.studio domain (GoDaddy)', priority: 'done',
        desc: 'Domain purchased and active. Renews yearly.',
        why: 'Your primary domain. Everything hangs off this — email, website, Railway deploy URL, Stripe webhook callbacks.',
        steps: [
          'Log in to GoDaddy and confirm smack.studio is active and auto-renew is on',
          'Note the renewal date so it doesn\'t expire unexpectedly',
          'Set your nameservers if needed (default GoDaddy nameservers are fine)',
        ],
        fields: [
          { id: 'login-url', label: 'GoDaddy Login', type: 'url', placeholder: 'https://godaddy.com' },
          { id: 'email', label: 'Account Email', type: 'email', placeholder: 'you@email.com' },
          { id: 'password', label: 'Password', type: 'password', sensitive: true },
          { id: 'expiry', label: 'Renewal Date', type: 'text', placeholder: 'Apr 2027' },
        ]
      },
      {
        id: 'google-workspace', title: 'Google Workspace (@smack.studio)', priority: 'now',
        desc: 'Business email at your domain. ~$6/user/mo.',
        why: 'You need a professional @smack.studio email before you start reaching out to studios, setting up accounts, and doing anything public. This is also your Google account for Docs, Drive, Calendar.',
        note: { type: 'info', text: '~$6/user/month. Free 14-day trial. You only need 1 user seat to start.' },
        steps: [
          'Go to workspace.google.com → click Get started',
          'Enter smack.studio when asked about your domain',
          'Create your admin account: e.g. david@smack.studio',
          'Google will ask you to verify domain ownership — they give you a TXT record to add',
          'In GoDaddy DNS → Manage DNS → Add Record → type: TXT, paste the value Google gives you',
          'Back in Google Workspace, click Verify — can take a few minutes',
          'Once verified, replace your existing MX records in GoDaddy with Google\'s 5 mail servers (Google shows you exactly what to add)',
          'Wait 15–60 min for DNS to propagate',
          'Send a test email to david@smack.studio to confirm it\'s working',
        ],
        fields: [
          { id: 'admin-email', label: 'Admin Email', type: 'email', placeholder: 'david@smack.studio' },
          { id: 'password', label: 'Password', type: 'password', sensitive: true },
          { id: 'mx-status', label: 'MX Records Status', type: 'text', placeholder: 'Configured' },
        ]
      },
      {
        id: 'github', title: 'GitHub repo set up', priority: 'now',
        desc: 'Private repo connected to Railway for auto-deploy.',
        why: 'Railway deploys directly from GitHub. Every push to main auto-deploys. You need the repo set up before you can connect Railway.',
        steps: [
          'Go to github.com/new → create a new private repo (e.g. smack-studio)',
          'Clone it locally: git clone [url]',
          'Copy your Workprint codebase into it, or initialize fresh',
          'Push to main: git add . && git commit -m "init" && git push',
          'Confirm the repo is visible at github.com/[you]/smack-studio',

        fields: [
          { id: 'repo-url', label: 'Repo URL', type: 'url', placeholder: 'https://github.com/you/smack-studio' },
        ]
      },
      {
        id: 'railway', title: 'Railway project configured', priority: 'now',
        desc: 'Hosting, env vars, custom domain, auto-deploy from GitHub.',
        why: 'Railway is where Smack runs. It handles the server, database files, environment variables, and deploys every time you push to GitHub. Nothing else needs to change for new studios — it all happens here.',
        note: { type: 'warn', text: 'Do not commit .env files or secrets to GitHub. Add all sensitive values as Railway environment variables instead.' },
        steps: [
          'Go to railway.app → New Project → Deploy from GitHub repo',
          'Select your smack-studio repo and choose the main branch',
          'Railway auto-detects your framework and sets up the build',
          'Go to Variables tab → add all your environment variables (DB path, Clerk keys, Stripe keys, Resend key, etc.)',
          'Go to Settings → Networking → Add domain → type smack.studio',
          'In GoDaddy DNS, add a CNAME record pointing smack.studio to Railway\'s deployment URL (Railway shows you exactly what to set)',
          'Enable auto-deploy: Settings → Source → Deploy on push to main → on',
          'Push a test commit and confirm it deploys automatically',
        ],
        fields: [
          { id: 'project-url', label: 'Railway Project URL', type: 'url', placeholder: 'https://railway.app/project/...' },
          { id: 'deploy-url', label: 'Live Deploy URL', type: 'url', placeholder: 'https://smack.studio' },
          { id: 'env-notes', label: 'Env Var Notes', type: 'textarea', placeholder: 'Any notes about variables set...' },
        ]
      },
      {
        id: 'clerk', title: 'Clerk.com auth configured', priority: 'now',
        desc: 'Multi-tenant auth. Each studio is a Clerk Organization.',
        why: 'Clerk handles login, sessions, and multi-tenancy so you don\'t have to build any of that. Critically, Clerk Organizations maps perfectly to your studio model — each Organization is one studio, and members can only see their own org\'s data.',
        note: { type: 'info', text: 'Use Clerk Organizations for multi-tenancy. Each studio = one Organization. This is the clean architecture that prevents data bleed between tenants.' },
        steps: [
          'Create account at clerk.com',
          'New Application → name it Smack → enable Email + Password sign-in',
          'Enable Organizations: Dashboard → Organizations → Enable',

          'Install in your app: npm install @clerk/nextjs (or your framework)',
          'Add CLERK_PUBLISHABLE_KEY and CLERK_SECRET_KEY to Railway environment variables',
          'Wrap your app with <ClerkProvider> and add Clerk middleware to protect routes',
          'Test: create a test user → create an organization → confirm they can only see that org\'s data',

        fields: [
          { id: 'pub-key', label: 'Publishable Key', type: 'text', sensitive: true, placeholder: 'pk_live_...' },
          { id: 'secret-key', label: 'Secret Key', type: 'password', sensitive: true, placeholder: 'sk_live_...' },
          { id: 'dashboard', label: 'Dashboard URL', type: 'url', placeholder: 'https://dashboard.clerk.com/apps/...' },
        ]
      },
      {
        id: 'stripe-platform', title: 'Stripe platform account (Smack billing)', priority: 'soon',
        desc: 'Separate Stripe account for billing studios. Not Workprint\'s Stripe.',

          'Complete business verification: legal name, address, EIN or SSN, bank account for payouts',

          'Enable Connect: Dashboard → Connect → Get started → configure your platform settings',
          'Create a webhook endpoint: Developers → Webhooks → Add endpoint',
          'Set endpoint URL to: https://smack.studio/api/webhooks/stripe',
          'Select events: customer.subscription.created, customer.subscription.deleted, invoice.paid, invoice.payment_failed, account.updated',
          'Copy the Webhook Signing Secret and add all keys to Railway env vars',
        ],
        fields: [
          { id: 'account-id', label: 'Account ID', type: 'text', placeholder: 'acct_...' },
          { id: 'pub-key', label: 'Publishable Key', type: 'text', sensitive: true, placeholder: 'pk_live_...' },
          { id: 'secret-key', label: 'Secret Key', type: 'password', sensitive: true, placeholder: 'sk_live_...' },
          { id: 'webhook-secret', label: 'Webhook Signing Secret', type: 'password', sensitive: true, placeholder: 'whsec_...' },
        ]
      },
      {

        fields: [

        ]

      {

          'Archive the old Workprint deployment',
        ]
      },
      {

        desc: 'First paying studio outside Workprint. Invite-only.',
        why: 'The first external studio validates everything: onboarding, billing, the settings UI, email flows. Pick someone you trust who will give you honest feedback.',
        steps: [

        ]
      },

  },
  {
    id: 'phase2', icon: '🔮', label: 'Phase 2', title: 'Phase 2 — After Launch',
    tasks: [
      { id: 'csv-import', title: 'CSV Import add-on', priority: 'later', desc: 'Let studios import project/client data from spreadsheets. Separate paid add-on.', why: 'Studios migrating from spreadsheets will want to import years of history. Scope this as a separate add-on so it doesn\'t block launch.' },
      { id: 'accent-themes-build', title: 'Studio accent themes (6 presets)', priority: 'later', desc: 'Let studios pick their color from 6 curated presets. Phase 2 only.', why: 'Confirmed in brand system decisions. 6 presets, no full custom. Gives studios personality without breaking the UI.' },
      { id: 'stripe-volume-negotiation', title: 'Stripe volume pricing negotiation', priority: 'later', desc: 'At $2M+ annual Connect volume, negotiate custom rates.', why: '20–40% off Stripe\'s published rates is achievable at volume. Track Connect volume from day one so you know when you hit the threshold.' },
      { id: 'international-contractors', title: 'International contractor payments', priority: 'later', desc: 'Expand beyond US-only. FX pass-through or premium tier.', why: 'US-only for launch. International adds FX complexity and risk. Add this when studios ask for it and you have data on demand.' },
      { id: 'native-app', title: 'Native iOS app', priority: 'later', desc: 'PWA first. Build native only if studios ask for it post-launch.', why: 'PWA covers the mobile use case. Native app is only worth building if studios consistently report the PWA doesn\'t meet their needs.' },

// ─── STATE ────────────────────────────────────────────────────────────────────

const STORAGE_TASKS = 'smack_tasks_v2';
const STORAGE_STEPS = 'smack_steps_v2';
const STORAGE_FIELDS = 'smack_fields_v2';

function load(key) { try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch { return {}; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let taskState = load(STORAGE_TASKS);
let stepState = load(STORAGE_STEPS);
let fieldData = load(STORAGE_FIELDS);
let currentFilter = 'all';
let openTaskId = null;

// Pre-mark done tasks
SECTIONS.forEach(s => s.tasks.forEach(t => {
  if (t.priority === 'done' && taskState[t.id] === undefined)
    taskState[t.id] = { completed: true };
}));
save(STORAGE_TASKS, taskState);

// ─── HELPERS ──────────────────────────────────────────────────────────────────

function getTask(id) {
  for (const s of SECTIONS) { const t = s.tasks.find(t => t.id === id); if (t) return t; }
  return null;
}

function stepsDone(taskId, steps) {
  if (!steps) return 0;
  return steps.filter((_, i) => stepState[`${taskId}:${i}`]).length;
}

function hasFieldData(taskId, fields) {
  if (!fields) return false;
  return fields.some(f => fieldData[`${taskId}:${f.id}`]);
}

function priorityClass(p) {
  return { now: 'priority-now', soon: 'priority-soon', later: 'priority-later', done: 'priority-done' }[p] || 'priority-later';
}

// ─── RENDER LIST ──────────────────────────────────────────────────────────────

function renderTask(task) {
  const done = taskState[task.id]?.completed;
  const sd = task.steps ? stepsDone(task.id, task.steps) : null;
  const allStepsDone = task.steps && sd === task.steps.length;
  const stepLabel = task.steps ? `${sd}/${task.steps.length}` : '';
  const hasData = hasFieldData(task.id, task.fields);

  return `
    <div class="task ${done ? 'completed' : ''}" id="task-${task.id}" data-completed="${done ? '1' : '0'}">
      <div class="task-row">
        <div class="task-check" onclick="toggleTask('${task.id}', event)">
          <span class="task-check-icon">✓</span>
        </div>
        <div class="task-body" onclick="openPanel('${task.id}')">
          <div class="task-title">${task.title}</div>
          <div class="task-desc">${task.desc}</div>
        </div>
        <div class="task-right">
          ${task.steps ? `<span class="task-step-progress ${allStepsDone ? 'all-done' : ''}">${stepLabel} steps</span>` : ''}
          ${hasData ? `<span class="task-step-progress all-done">● saved</span>` : ''}
          <span class="task-priority ${priorityClass(task.priority)}">${task.priority === 'done' ? 'Done' : task.priority === 'now' ? 'Now' : task.priority === 'soon' ? 'Soon' : 'Later'}</span>
          <button class="task-open-btn" onclick="openPanel('${task.id}')" title="Open details">›</button>
        </div>
      </div>
    </div>`;
}

function renderSections() {
  document.getElementById('sections-container').innerHTML = SECTIONS.map(s => `
    <div class="section" id="section-${s.id}">
      <div class="section-header">
        <div class="section-icon">${s.icon}</div>
        <div class="section-meta">
          <div class="section-eyebrow">${s.label}</div>
          <div class="section-title">${s.title}</div>
        </div>
        <div class="section-badge" id="badge-${s.id}"></div>
      </div>
      <div id="tasks-${s.id}">${s.tasks.map(renderTask).join('')}</div>
    </div>`).join('');
}

function renderNav() {
  document.getElementById('sidebar-nav').innerHTML = SECTIONS.map(s => `
    <a class="nav-item" href="#section-${s.id}">
      <div class="nav-item-icon">${s.icon}</div>
      <div class="nav-item-text">
        <span class="nav-item-label">${s.title}</span>
        <div class="nav-mini-bar"><div class="nav-mini-fill" id="nav-fill-${s.id}"></div></div>
      </div>
    </a>`).join('');
}

// ─── PANEL ───────────────────────────────────────────────────────────────────

function openPanel(id) {
  const task = getTask(id);
  if (!task) return;
  openTaskId = id;

  const [pLabel, pClass] = [
    { now:'Now', soon:'Soon', later:'Later', done:'Done' }[task.priority],
    priorityClass(task.priority)
  ];

  document.getElementById('panel-priority').innerHTML = `<span class="task-priority ${pClass}">${pLabel}</span>`;
  document.getElementById('panel-title').textContent = task.title;
  document.getElementById('panel-desc').textContent = task.desc;

  let html = '';

  // Why
  if (task.why) {
    html += `<div class="panel-section">
      <div class="panel-section-title">Why this matters</div>
      <div class="panel-why">${task.why}</div>
      ${task.note ? `<div class="panel-note ${task.note.type === 'warn' ? 'warn' : task.note.type === 'good' ? 'good' : 'info'}">${task.note.text}</div>` : ''}
    </div>`;
  }

  // Steps
  if (task.steps && task.steps.length) {
    const done = stepsDone(id, task.steps);
    html += `<div class="panel-section">
      <div class="panel-section-title">Steps — ${done} of ${task.steps.length} done</div>
      <div class="step-list">
        ${task.steps.map((s, i) => {
          const isDone = !!stepState[`${id}:${i}`];
          return `<div class="step-item ${isDone ? 'step-done' : ''}" id="step-${id}-${i}" onclick="toggleStep('${id}', ${i})">
            <div class="step-num">${isDone ? '✓' : i+1}</div>
            <div class="step-text">${s}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Fields
  if (task.fields && task.fields.length) {
    const cols = task.fields.length === 1 ? 'cols-1' : '';
    html += `<div class="panel-section">
      <div class="panel-section-title">Store info — credentials, links, notes</div>
      <div class="fields-grid ${cols}">
        ${task.fields.map(f => renderPanelField(id, f)).join('')}
      </div>
      <div class="fields-note">Saved locally in your browser only. Not synced, not shared, not sent anywhere.</div>
    </div>`;
  }

  // Complete button
  const isDone = taskState[id]?.completed;
  html += `<div class="panel-section">
    <button class="panel-complete-btn ${isDone ? 'is-done' : ''}" id="panel-complete-btn" onclick="toggleTask('${id}', null)">
      <span class="btn-icon">${isDone ? '✓' : '○'}</span>
      ${isDone ? 'Marked as complete — click to undo' : 'Mark as complete'}
    </button>
  </div>`;

  document.getElementById('panel-body').innerHTML = html;
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  openTaskId = null;
}

function renderPanelField(taskId, field) {
  const key = `${taskId}:${field.id}`;
  const val = fieldData[key] || '';

  if (field.type === 'textarea') {
    return `<div class="field-group" style="grid-column: 1/-1;">
      <div class="field-label">${field.label}</div>
      <textarea class="field-input" placeholder="${field.placeholder || ''}" oninput="saveField('${key}', this.value)">${val}</textarea>
    </div>`;
  }
  if (field.sensitive) {
    return `<div class="field-group">
      <div class="field-label">${field.label}</div>
      <div class="field-input-wrap">
        <input type="password" class="field-input sensitive" id="fi-${key}" value="${val}" placeholder="${field.placeholder || ''}" oninput="saveField('${key}', this.value)">
        <button class="field-toggle" onclick="toggleSensitive('fi-${key}', this)">👁</button>
      </div>
    </div>`;
  }
  return `<div class="field-group">
    <div class="field-label">${field.label}</div>
    <div class="field-input-wrap">
      <input type="${field.type || 'text'}" class="field-input" id="fi-${key}" value="${val}" placeholder="${field.placeholder || ''}" oninput="saveField('${key}', this.value)">
      ${val ? `<button class="field-copy-btn" onclick="copyField('fi-${key}', this)">copy</button>` : ''}
    </div>
  </div>`;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────

function toggleTask(id, event) {
  if (event) event.stopPropagation();
  const was = taskState[id]?.completed;
  taskState[id] = { completed: !was };
  save(STORAGE_TASKS, taskState);
  const el = document.getElementById(`task-${id}`);
  el.classList.toggle('completed', !was);
  el.setAttribute('data-completed', !was ? '1' : '0');
  applyFilter(currentFilter);
  updateProgress();
  // Update panel button if open
  if (openTaskId === id) {
    const btn = document.getElementById('panel-complete-btn');
    if (btn) {
      btn.className = `panel-complete-btn ${!was ? 'is-done' : ''}`;
      btn.innerHTML = `<span class="btn-icon">${!was ? '✓' : '○'}</span> ${!was ? 'Marked as complete — click to undo' : 'Mark as complete'}`;
    }
  }
}

function toggleStep(taskId, idx) {
  const key = `${taskId}:${idx}`;
  stepState[key] = !stepState[key];
  save(STORAGE_STEPS, stepState);
  // Update step UI in panel
  const stepEl = document.getElementById(`step-${taskId}-${idx}`);
  if (stepEl) {
    stepEl.classList.toggle('step-done', !!stepState[key]);
    stepEl.querySelector('.step-num').textContent = stepState[key] ? '✓' : idx + 1;
    stepEl.querySelector('.step-text').style.textDecoration = stepState[key] ? 'line-through' : '';
  }
  // Update step count in panel title
  const task = getTask(taskId);
  if (task && task.steps) {
    const done = stepsDone(taskId, task.steps);
    const titleEl = document.querySelector(`#panel-body .panel-section-title`);
    // find steps section title
    document.querySelectorAll('#panel-body .panel-section-title').forEach(el => {
      if (el.textContent.includes('Steps')) el.textContent = `Steps — ${done} of ${task.steps.length} done`;
    });
    // Update step progress in main list
    const taskEl = document.getElementById(`task-${taskId}`);
    if (taskEl) {
      const sp = taskEl.querySelector('.task-step-progress');
      if (sp && !sp.classList.contains('all-done')) {
        sp.textContent = `${done}/${task.steps.length} steps`;
        if (done === task.steps.length) sp.classList.add('all-done');
      }
    }
  }
}

function saveField(key, value) {
  fieldData[key] = value;
  save(STORAGE_FIELDS, fieldData);
  // Update saved indicator in task row
  const taskId = key.split(':')[0];
  const taskEl = document.getElementById(`task-${taskId}`);
  if (taskEl) {
    const task = getTask(taskId);
    const hasData = hasFieldData(taskId, task?.fields);
    const indicators = taskEl.querySelectorAll('.task-step-progress');
    // find or add saved indicator
    let savedEl = taskEl.querySelector('.saved-indicator');
    if (hasData && !savedEl) {
      const rightEl = taskEl.querySelector('.task-right');
      const span = document.createElement('span');
      span.className = 'task-step-progress all-done saved-indicator';
      span.textContent = '● saved';
      rightEl.insertBefore(span, rightEl.firstChild);
    }
  }
}

function toggleSensitive(inputId, btn) {
  const input = document.getElementById(inputId);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁' : '🙈';
}

function copyField(inputId, btn) {
  const val = document.getElementById(inputId)?.value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    const o = btn.textContent; btn.textContent = '✓';
    setTimeout(() => btn.textContent = o, 1200);
  });
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
  applyFilter(filter);
}

function applyFilter(filter) {
  document.querySelectorAll('.task').forEach(el => {
    const done = el.getAttribute('data-completed') === '1';
    el.classList.toggle('hidden', filter === 'active' ? done : filter === 'done' ? !done : false);
  });
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────

function updateProgress() {
  let total = 0, done = 0;
  SECTIONS.forEach(s => {
    const t = s.tasks.length;
    const d = s.tasks.filter(t => taskState[t.id]?.completed).length;
    total += t; done += d;
    const pct = t ? Math.round((d/t)*100) : 0;
    const fill = document.getElementById(`nav-fill-${s.id}`);
    if (fill) fill.style.width = pct + '%';
    const badge = document.getElementById(`badge-${s.id}`);
    if (badge) { badge.textContent = `${d} / ${t}`; badge.className = 'section-badge' + (d === t ? ' done' : ''); }
  });
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('overall-fill').style.width = pct + '%';
  document.getElementById('overall-count').innerHTML = `<span>${done}</span> / ${total} complete`;
  document.getElementById('sidebar-fill').style.width = pct + '%';
  document.getElementById('sidebar-label').textContent = `${pct}% — ${done} of ${total} done`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

renderNav();
renderSections();
updateProgress();
</script>
</body>
</html>
